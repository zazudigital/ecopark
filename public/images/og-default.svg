<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1740"/>
      <stop offset="100%" stop-color="#152050"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <g opacity="0.04">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  <!-- Green accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#1a7a2b"/>
  <!-- Logo icon -->
  <g transform="translate(80, 220)">
    <rect width="64" height="64" fill="rgba(255,255,255,0.15)"/>
    <path d="M12 20l16-11 16 11 16-11v38l-16 11-16-11-16 11V20z" stroke="#fff" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
    <path d="M28 9v38M44 20v38" stroke="#fff" stroke-width="2.5"/>
  </g>
  <!-- ECOPARK text -->
  <text x="80" y="360" font-family="sans-serif" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="-2">ECOPARK</text>
  <!-- BREDA text -->
  <text x="83" y="400" font-family="sans-serif" font-weight="700" font-size="24" fill="rgba(255,255,255,0.7)" letter-spacing="8">BREDA</text>
  <!-- Tagline -->
  <text x="80" y="460" font-family="sans-serif" font-weight="600" font-size="22" fill="rgba(255,255,255,0.6)">Overslagstation voor afval en grondstoffen</text>
  <!-- Stats bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <text x="120" y="580" font-family="monospace" font-weight="700" font-size="28" fill="#1a7a2b">50+</text>
  <text x="120" y="604" font-family="sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="2">VRACHTWAGENS/DAG</text>
  <text x="420" y="580" font-family="monospace" font-weight="700" font-size="28" fill="#1a7a2b">2.4 HA</text>
  <text x="420" y="604" font-family="sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="2">TERREIN</text>
  <text x="720" y="580" font-family="monospace" font-weight="700" font-size="28" fill="#1a7a2b">180K TON</text>
  <text x="720" y="604" font-family="sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="2">CAPACITEIT/JAAR</text>
  <text x="1020" y="580" font-family="monospace" font-weight="700" font-size="28" fill="#1a7a2b">24/7</text>
  <text x="1020" y="604" font-family="sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="2">BEVEILIGING</text>
  <!-- VIHB badge -->
  <rect x="1010" y="210" width="110" height="36" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="1065" y="234" font-family="monospace" font-weight="700" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="4">VIHB</text>
</svg>
